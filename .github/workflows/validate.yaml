name: Validate HACS

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          # This integration ships as a HACS *custom* repository, not the
          # default store, so it is not registered in home-assistant/brands.
          # Skip the brands gate to keep validation meaningful for our path.
          ignore: "brands"