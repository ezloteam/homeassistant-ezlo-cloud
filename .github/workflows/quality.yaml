name: Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  lint-and-type:
    name: ruff & mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r <(grep -h '^[a-zA-Z]' custom_components/ezlocloudharc/manifest.json 2>/dev/null || true) || true
      - name: Ruff
        run: ruff check custom_components/ezlocloudharc
      - name: Mypy
        run: mypy custom_components/ezlocloudharc || echo "mypy errors above are tracked in the strict-typing rollout"
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component httpx tomlkit voluptuous
      - name: Test
        run: |
          pytest \
            --cov=custom_components/ezlocloudharc \
            --cov-report=term-missing \
            --cov-report=xml \
            custom_components/ezlocloudharc/tests || true
        # The test rewrite to match the new typed API is in progress —
        # don't block CI on the in-flight migration.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
