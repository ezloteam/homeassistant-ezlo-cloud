rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not register any service actions.
  appropriate-polling:
    status: exempt
    comment: |
      This integration creates no entities and runs no coordinator-managed
      polling, which is what this rule governs. It does hit the subscription
      endpoint in two bounded, non-entity ways: a background poll
      (_poll_payment_and_login, every 5s for at most 15 min) that completes an
      authenticated-but-unsubscribed login once the central subscription lands,
      and an on-demand, 60s-cached status fetch when the subscribe screen is
      rendered.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not register any service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      This integration does not create entities.
  entity-unique-id:
    status: exempt
    comment: |
      This integration does not create entities.
  has-entity-name:
    status: exempt
    comment: |
      This integration does not create entities.
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      This integration does not register any service actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable:
    status: exempt
    comment: |
      This integration does not create entities.
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: exempt
    comment: |
      This integration does not create entities.
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices:
    status: exempt
    comment: |
      This integration does not create devices.
  diagnostics: done
  discovery:
    status: exempt
    comment: |
      The Ezlo HA Cloud service is configured manually with user credentials;
      discovery is not applicable.
  discovery-update-info:
    status: exempt
    comment: |
      Discovery is not applicable.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: |
      This integration does not interact with physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      This integration does not create devices.
  entity-category:
    status: exempt
    comment: |
      This integration does not create entities.
  entity-device-class:
    status: exempt
    comment: |
      This integration does not create entities.
  entity-disabled-by-default:
    status: exempt
    comment: |
      This integration does not create entities.
  entity-translations:
    status: exempt
    comment: |
      This integration does not create entities.
  exception-translations: done
  icon-translations:
    status: exempt
    comment: |
      This integration does not create entities.
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: |
      This integration does not create devices.

  # Platinum
  async-dependency:
    status: done
    comment: |
      The integration depends on tomlkit (sync) for rendering the FRPC
      config file. All HTTP I/O is async via Home Assistant's shared httpx
      and aiohttp clients; tomlkit only runs inside async_add_executor_job.
  inject-websession: done
  strict-typing: done
